$kind: http-request
name: '16 Solicitud con token expirado'
method: GET
url: '{{base_url}}/api/products'
order: 16000
headers:
  - key: Authorization
    value: 'Bearer {{expired_jwt_token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Estado 401 cuando se use un token expirado real', function () { pm.response.to.have.status(401); });
