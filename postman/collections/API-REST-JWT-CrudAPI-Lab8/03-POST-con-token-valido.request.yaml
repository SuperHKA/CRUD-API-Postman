$kind: http-request
name: 03 POST con token valido
method: POST
url: "{{base_url}}/api/products"
order: 8000
auth:
  type: bearer
  credentials:
    token: "{{jwt_token}}"
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "codigo": "A002",
      "producto": "Monitor",
      "precio": 150,
      "cantidad": 5
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Estado 201', function () { pm.response.to.have.status(201); });
      var json = pm.response.json();
      pm.test('producto creado', function () { pm.expect(json.data.id).to.exist; });
      pm.environment.set('product_id', json.data.id);
    language: text/javascript
