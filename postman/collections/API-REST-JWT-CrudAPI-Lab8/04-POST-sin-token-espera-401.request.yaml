$kind: http-request
name: '04 POST sin token espera 401'
method: POST
url: '{{base_url}}/api/products'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "codigo": "A001",
      "producto": "Mouse optico",
      "precio": 10.50,
      "cantidad": 5
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Estado 401', function () { pm.response.to.have.status(401); });
