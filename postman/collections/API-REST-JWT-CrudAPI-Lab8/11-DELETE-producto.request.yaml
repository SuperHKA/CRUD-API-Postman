$kind: http-request
name: '11 DELETE producto'
method: DELETE
url: '{{base_url}}/api/products/{{product_id}}'
order: 11000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{jwt_token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Estado 200', function () { pm.response.to.have.status(200); });
