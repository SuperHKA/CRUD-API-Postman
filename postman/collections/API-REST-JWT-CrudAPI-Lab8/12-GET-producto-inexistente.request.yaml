$kind: http-request
name: '12 GET producto inexistente'
method: GET
url: '{{base_url}}/api/products/999999'
order: 12000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{jwt_token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Estado 404', function () { pm.response.to.have.status(404); });
