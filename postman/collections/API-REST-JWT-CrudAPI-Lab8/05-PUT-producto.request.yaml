$kind: http-request
name: 05 PUT producto
method: PUT
url: "{{base_url}}/api/products/"
order: 10000
auth:
  type: bearer
  credentials:
    token: "{{jwt_token}}"
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "codigo": "A001",
      "producto": "Mouse optico actualizado",
      "precio": 12.75,
      "cantidad": 8
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Estado 200', function () { pm.response.to.have.status(200); });
      pm.test('producto actualizado', function () { pm.expect(pm.response.json().data.cantidad).to.eql(8); });
    language: text/javascript
