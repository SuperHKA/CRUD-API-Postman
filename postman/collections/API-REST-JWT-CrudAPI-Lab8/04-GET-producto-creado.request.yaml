$kind: http-request
name: 04 GET producto creado
method: GET
url: "{{base_url}}/api/products/"
order: 9000
auth:
  type: bearer
  credentials:
    token: "{{jwt_token}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Estado 200', function () { pm.response.to.have.status(200); });
      pm.test('datos del producto', function () { pm.expect(pm.response.json().data.codigo).to.eql('A001'); });
    language: text/javascript
